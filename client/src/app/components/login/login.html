<div class="auth-container">
  <div class="auth-card">

    <h2 class="title">Login</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          formControlName="email"
          [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        >
        <div class="invalid-feedback" *ngIf="form.get('email')?.errors?.['required']">
          Email is required
        </div>
        <div class="invalid-feedback" *ngIf="form.get('email')?.errors?.['email']">
          Invalid email format
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          formControlName="password"
          [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
        >
        <div class="invalid-feedback">
          Password is required
        </div>
      </div>

      <div class="alert alert-danger py-2" *ngIf="error">
        {{ error }}
      </div>

      <button class="btn btn-primary w-100" [disabled]="loading || form.invalid">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
      </button>

      <p class="switch-link">
        Don't have an account?
        <a routerLink="/register">Register</a>
      </p>
    </form>

  </div>
</div>
