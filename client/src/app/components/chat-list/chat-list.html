<div class="chat-list-container card shadow-sm">
  <div class="card-header bg-primary text-white">
    <h5 class="mb-0">Chats</h5>
  </div>

  <div class="card-body p-0">
    @if (loading) {
      <div class="text-center py-3">
        <div class="spinner-border"></div>
      </div>
    }

    @if (!loading && chats.length === 0) {
      <p class="text-center text-muted py-3">No chats found.</p>
    }

    <ul class="list-group list-group-flush">
      @for (chat of chats; track chat._id) {
        <li 
          class="list-group-item chat-item"
          (click)="select.emit(chat)"
        >
          <div class="d-flex flex-column">
            <strong>{{ chat.chatName }}</strong>

            <small class="text-muted">
              @if (chat.latestMessage) {
                {{ chat.latestMessage.content }}
              } @else {
                No messages yet
              }
            </small>
          </div>
        </li>
      }
    </ul>
  </div>
</div>
